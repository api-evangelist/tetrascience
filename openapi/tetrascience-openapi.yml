                    example: Source with source ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist
  /v1/data-acquisition/agent/upload:
    post:
      summary: File Upload
      description: 'This endpoint uploads a file to TetraScience Cloud.  It requires a user-defined agent set up in the TetraScience
        Web UI.  API users can use it to upload, manage their files, and trigger pipelines.



        Maximum payload size: 500MB


        Validations performed by this endpoint:


        1. `agentId` must be a valid ID of the user defined agent (UDA)

        2. param `sourceType` must contain only lower case alphanumerical characters and dashes

        3. params `metadata` and `tags` must contain only ASCII characters; `tags` values cannot contain comma and values
        must be unique

        4. params `metadata` and `tags` together as JSON objects must have less than 1.5KB of text (1536 characters)'
      tags:
      - Data Acquisition
      operationId: user-defined-integration-file-upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - agentId
              - file
              - filePath
              properties:
                agentId:
                  type: string
                  description: This is the sourceId for a user-defined integration.  Need to copy from the TetraScience Web
                    UI where the user-defined integration is created.  For existing TetraScience Agent who can connect to
                    TetraScience Cloud directly, provide the agentId to this field.
                agent:
                  type: string
                  description: Type of agent, in the form `TetraScience.Agent.file-log`, `TetraScience.Agent.empower`, etc.
                    If provided, object in data lake will have the metadata value `agent` in the form of `agent agentVersion`
                    (for example, `TetraScience.Agent.file-log v4.3.0')
                  enum:
                  - TetraScience.Agent.file-log
                  - TetraScience.Agent.empower
                  - TetraScience.Agent.unicorn
                  - TetraScience.Agent.labx
                  - TetraScience.Agent.chromeleon
                  - TetraScience.Agent.user-defined
                  default: TetraScience.Agent.user-defined
                agentVersion:
                  type: string
                  description: Version of the agent that's uploading the file (for example, `v4.3.0`)
                sourceType:
                  type: string
                  description: 'If provided, this field will overwrite the sourceType configured in the TetraScience Web UI.
                    Default value: `unknown`  A valid sourceType string can contain only alphanumeric characters in lower
                    case letters and dash. Any other character will trigger validation error.'
                  default: unknown
                fileCategory:
                  type: string
                  description: The file category of the uploaded file, included in the datalake path.
                  enum:
                  - RAW
                  - PROCESSED
                  default: RAW
                fileId:
                  type: string
                  description: If provided, it must be a valid and unique UUID. If not provided, platform will generate unique
                    UUID value.
                traceId:
                  type: string
                  description: A valid UUID, if provided. If not present, system will use the `fileId` value
                filePath:
                  type: string
                  description: Required. An example of `filePath` can be `/experiment_2/sample a/result.pdf`
                file:
                  type: string
                  format: binary
                  description: Content of a single file to upload
                payloadGzip:
                  type: string
                  description: 'If set to `true`, indicates the file content is gzip compressed. If false or omitted, the
                    content will be gzipped during upload. Default value: `false`.'
                  default: 'false'
                metadata:
                  type: string
                  description: 'JSON string as `{"key", "value"}`. The metadata and value will overwrite metadata defined
                    for the user-defined integration in the TetraScience Web UI. Validations: fields and values must contain
                    only ASCII characters; values must be either string or null values.'
                tags:
                  type: string
                  description: 'JSON string as `["tag 1", "tag 2"]`. Validations: values must contain only ASCII characters;
                    value must not have comma (,); values must be unique'
                labels:
                  type: string
                  description: 'JSON string as `[{"name":"label name", "value":"label value"}]`. The labels will join the
                    agent defined labels. Validations: Names can include any unicode characters, except line breaks. They
                    cannot be empty, and they have a maximun length of 128 characters. Values can include any unicode characters,
                    except line breaks, and they cannot be empty.'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"type\": \"s3file\",\n    \"fileKey\": \"demo/1cd9ffeb-1e10-45d2-a8d6-61a88c829e5c/RAW/test/raw.json\"\
                    ,\n    \"bucket\": \"ts-platform-env-datalake\",\n    \"version\": \"grXOL0hSiCeKu094tBw.mu4LXQErWzGT\"\
                    ,\n    \"fileId\": \"c4c6cfdf-67d0-4672-a1a6-0b9f558d0156\"\n}"
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: s3file
                  fileKey:
                    type: string
                    example: demo/1cd9ffeb-1e10-45d2-a8d6-61a88c829e5c/RAW/test/raw.json
                  bucket:
                    type: string
                    example: ts-platform-env-datalake
                  version:
                    type: string
                    example: grXOL0hSiCeKu094tBw.mu4LXQErWzGT
                  fileId:
                    type: string
                    example: c4c6cfdf-67d0-4672-a1a6-0b9f558d0156
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"statusCode\": 404,\n    \"error\": \"Not Found\",\n    \"message\": \"Source with config\
                    \ source ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist\"\n}"
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                    default: 0
                  error:
                    type: string
                    example: Not Found
                  message:
                    type: string
                    example: Source with config source ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist
        '422':
          description: '422'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"statusCode\": 422,\n    \"error\": \"Unprocessable Entity\",\n    \"message\": \"Param\
                    \ sourceType contains invalid character or upper case letter\"\n}"
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 422
                    default: 0
                  error:
                    type: string
                    example: Unprocessable Entity
                  message:
                    type: string
                    example: Param sourceType contains invalid character or uppercase letter
      deprecated: false
  /v1/data-acquisition/agent/log:
    post:
      summary: Agent Log Upload
      description: This endpoint uploads agents log to TetraScience Cloud. It requires a user-defined agent set up in the
