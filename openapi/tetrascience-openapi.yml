        schema:
          type: string
          enum:
          - local
          - cloud
        required: false
      responses:
        '200':
          description: Successful response with the latest agent configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfiguration'
    post:
      summary: Remotely configure a running File-Log agent
      description: '-| This endpoint allows configuration of a running File-Log Agent with paths.  The File-Log Agent must
        be version 4.1.0 or greater, and configured to Receive Commands. Additionally, the Command Queue must be enabled for
        this Agent on TDP.

        This will remove any paths not included in the JSON. To preserve existing paths, you must include them each time you
        POST.

        If the target''s command queue doesn''t exist or is not accessible, the API will return a 400 error code and doesn''t
        create the command.

        For more details, see https://developers.tetrascience.com/docs/configuring-the-file-log-agent-in-the-cloud.'
      tags:
      - Agents
      operationId: agent-post-configuration
      parameters:
      - name: agentId
        in: path
        description: Agent ID
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                destination_id:
                  type: string
                  format: uuid
                  description: '**FLA v4.3.0+**: The Destination Id of the Agent'
                  example: 2e72c40f-432e-46a9-a027-e70686e8cd39
                services_enabled:
                  type: array
                  items:
                    type: string
                    enum:
                    - fileWatcher
                  description: The services enabled for the Agent
                  example:
                  - fileWatcher
                services_configuration:
                  type: object
                  properties:
                    fileWatcher:
                      type: object
                      properties:
                        use_path_configuration:
                          type: boolean
                          description: Whether to use path level configuration for start date and interval.  Must be set to
                            true.
                          example: true
                        paths:
                          type: array
                          items:
                            $ref: '#/components/schemas/FLAFileWatcherPathConfigurationItem'
                      required:
                      - use_path_configuration
                  required:
                  - fileWatcher
              required:
              - services_enabled
              - services_configuration
      responses:
        '200':
          description: Successful response with the id to the command that executed the update
          content:
            application/json:
              examples:
                Result:
                  value:
                    commandId: 729dec7d-26f6-4ac2-b1c0-2ae918e270dc
              schema:
                type: object
                properties:
                  commandId:
                    type: string
                    example: 729dec7d-26f6-4ac2-b1c0-2ae918e270dc
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Agent is Offline:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: Cloud configuration is supported only by Online agents
                Queue is not created or inaccessible:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: Queue for target id 729dec7d-26f6-4ac2-b1c0-2ae918e270dc not found or was not writeable. If you
                      see this message in error, please try disabling and re-enabling the queue.
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 400
                    default: 0
                  error:
                    type: string
                    example: Bad Request
                  message:
                    type: string
                    example: Cloud configuration is supported only by Online agents
        '404':
          description: Agent not found
          content:
            application/json:
              examples:
                Result:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Agent with id 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda not found
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                    default: 0
                  error:
                    type: string
                    example: Not Found
                  message:
                    type: string
                    example: Agent with id 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda not found
