          type: object
          additionalProperties:
            $ref: '#/components/schemas/StepsConfig'
          default: {}
        artifactType:
          type: string
          enum:
          - protocol
          - tetraflow
          default: protocol
        clusterId:
          deprecated: true
          oneOf:
          - type: 'null'
          - type: string
          description: 'DEPRECATED: Prefer clusterPolicyId for cost-effective ephemeral job clusters.'
