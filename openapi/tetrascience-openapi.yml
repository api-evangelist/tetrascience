  /v1/data-acquisition/connectors/{id}/files:
    get:
      tags:
      - Connectors
      operationId: ConnectorController_getFiles
      summary: Get a Connector's reported files
      description: '**:warning: This is a new API which is still subject to change.**


        Use this endpoint to get metadata about the files reported by a Connector, including those that have not yet been
        uploaded or that have failed.'
      parameters:
      - name: id
        description: The Connector's id.
        required: true
        in: path
        schema:
          type: string
      - name: fileIds
        description: A list of file ids to filter by.
        required: false
        in: query
        schema:
          type: array
          items:
            type: string
      - name: excludeFileIds
        description: A list of file ids to exclude from the response.
        required: false
        in: query
        schema:
          type: array
          items:
            type: string
      - name: uniqueExternalIds
        description: A list of unique external ids to filter by. Used by Connectors to deduplicate external files.
        required: false
        in: query
        schema:
          type: array
          items:
            type: string
      - name: excludeUniqueExternalIds
        description: A list of unique external ids to exclude from the response. Used by Connectors to deduplicate external
          files.
        required: false
        in: query
        schema:
          type: array
          items:
            type: string
      - name: statuses
        description: A list of file statuses to filter by.
        required: false
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - PENDING
            - PROCESSING
            - SKIPPED
            - SUCCESS
            - ERROR
      - name: maxErrors
        description: The maximum number of errors to filter by. Used by Connectors to limit file upload retries.
        required: false
        in: query
        schema:
          type: number
      - name: createdBefore
        description: The maximum creation date to filter by.
        required: false
        in: query
        schema:
          format: date-time
          type: string
      - name: createdAfter
        description: The minimum creation date to filter by.
        required: false
        in: query
        schema:
          format: date-time
          type: string
      - name: updatedBefore
        description: The maximum update date to filter by.
        required: false
        in: query
        schema:
          format: date-time
          type: string
      - name: updatedAfter
        description: The minimum update date to filter by.
        required: false
        in: query
        schema:
          format: date-time
          type: string
      - name: orderBy
        description: The field to order by.
        required: false
        in: query
        schema:
          type: string
          enum:
          - filepath
          - status
          - errorCount
          - updatedAt
          - createdAt
      - name: orderDirection
        description: The order direction.
        required: false
        in: query
        schema:
          enum:
          - ASC
          - DESC
          type: string
      - name: take
        description: The number of files to take. Default is 50.
        required: false
        in: query
        schema:
          type: number
          default: 50
      - name: skip
        description: The number of files to skip.
        required: false
        in: query
        schema:
          type: number
          default: 0
      responses:
        '200':
          description: Successful response with a list of files reported by a Connector
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorFilesResponse'
