                type: object
                properties:
                  AccessKeyId:
                    type: string
                    example: EXAMPLEAWSACCESSKEYID
                  SecretAccessKey:
                    type: string
                    example: EXAMPLEAWSSECRETACCESSKEY/REDACTED
                  SessionToken:
                    type: string
                    example: EXAMPLE_AWS_SESSION_TOKEN_REDACTED
                  Expiration:
                    type: string
                    example: '2020-07-01T19:12:22.000Z'
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"statusCode\": 404,\n    \"error\": \"Not Found\",\n    \"message\": \"Source with source\
                    \ ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist\"\n}"
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                    default: 0
                  error:
                    type: string
                    example: Not Found
