      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - agentId
              - agentVersion
              - systemmetric
              properties:
                agentId:
                  type: string
                  description: This is the sourceId for a user-defined integration.  Need to copy from the TetraScience Web
                    UI where the user-defined integration is created.  For existing TetraScience Agent who can connect to
                    TetraScience Cloud directly, provide the agentId to this field.
                agentVersion:
                  type: string
                  description: The Agent version, such as "v1.0.0".
                systemmetric:
                  type: string
                  description: The system metric file to upload.
                  format: binary
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"message\": \"OK\"\n}"
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OK
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"statusCode\": 404,\n    \"error\": \"Not Found\",\n    \"message\": \"Source with source\
                    \ ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist\"\n}"
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                    default: 0
                  error:
