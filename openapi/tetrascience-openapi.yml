        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"statusCode\": 404,\n    \"error\": \"Not Found\",\n    \"message\": \"Source with source\
                    \ ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist\"\n}"
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                    default: 0
                  error:
                    type: string
                    example: Not Found
                  message:
                    type: string
                    example: Source with source ID 47ab98d5-cccb-4a7d-86f4-0ff8f7c11bda does not exist
      deprecated: false
components:
  schemas:
    FLAConfiguration:
      type: object
      description: Agent configuration if available, null otherwise.
      properties:
        group_user:
          type: object
          properties:
            user_name:
              type: string
              description: The Windows User service account used for managing folder and file access for the agent.
              example: user1
            password:
              type: string
              description: A secure hash of the user's password.
              example: '-1943064076'
        agent_configuration:
          type: object
          properties:
            s3_direct_upload:
              type: boolean
              description: Whether to enable direct upload of files and logs to S3.
              example: true
            receive_commands:
              type: boolean
              description: Whether the agent should receive and execute commands from TDP.
              example: true
            destination_id:
              type: string
              format: uuid
              description: The Destination Id of the Agent, used in place of its own ID in datalake file keys.
              example: 2e72c40f-432e-46a9-a027-e70686e8cd39
            agent_id:
              type: string
              description: The ID of the agent.
              example: f82d2230-eed1-443c-9ed8-2e1fef9039c2
            org_slug:
              type: string
              description: The slug of the organization.
              example: tetrascience
            Authentication:
              type: string
              description: A secure hash of the agent's authentication token.
              example: '-1943064076'
            advanced_setting:
              type: object
              properties:
                heart_beat_interval:
                  type: integer
                  description: The interval in seconds for the agent to check its connection status.
                  example: 30
                agent_log_upload_job_interval:
                  type: integer
                  description: The interval in seconds for the agent to upload logs.
                  example: 30
                compression_type:
                  type: string
                  enum:
                  - Zip
                  - SevenZip
                  description: The compression type for the agent.
                  example: zip
                retry_limit:
                  type: integer
                  description: The number of times the agent will retry to upload a file before it stops attempting the upload.
                  example: 3
                tdpApiUrlOverride:
                  type: string
                  description: The URL of the TDP API
                  example: https://api.tetrascience.com
                validateAwsCertificate:
                  type: boolean
                  description: Indicates whether to validate the AWS certificate or not.
                  example: true
                proxyUseCustom:
                  type: boolean
                  description: Indicates whether to use a custom proxy or not.
                  example: true
                proxyHost:
                  type: string
                  description: The host of the proxy, if one is set.
                  example: proxy.example.com
                proxyPort:
                  type: integer
                  description: The port of the proxy, if one is set.
                  example: 8080
                proxyBypassList:
                  type: string
                  description: The list of addresses to bypass the proxy.
                  example: example.com,example.org
                proxyUsername:
                  type: string
                  description: The username for the proxy, if one is set.
                  example: proxyuser
                proxyPassword:
                  type: string
                  description: A secure hash of the agent's authentication token.
                  example: '-1943064076'
                proxyUseSystem:
                  type: boolean
                  description: Indicates whether to use the system proxy or not.
                  example: false
        services_enabled:
          type: array
          items:
            type: string
            enum:
            - fileWatcher
          description: The services enabled for the agent.
          example:
          - fileWatcher
        services_configuration:
          type: object
          properties:
            fileWatcher:
              type: object
              properties:
                use_path_configuration:
                  type: boolean
                  description: Indicates whether or not to use path-level configuration for start date and interval.
                  example: true
                paths:
                  type: array
                  items:
                    $ref: '#/components/schemas/FLAFileWatcherPathConfigurationItem'
              required:
              - use_path_configuration
          required:
          - fileWatcher
        windows_scheduled_task:
          type: object
          properties:
            enabled:
              type: boolean
              description: Indicates whether the Windows scheduled task to ensure the agent service is running is enabled
                or not..
              example: true
            time:
              type: string
              description: The time of day when the Windows scheduled task is triggered.
              example: 1:00pm
    FLAFileWatcherPathConfigurationItem:
      type: object
      description: '**FLA v4.3.0+**: Options for archival and deletion of files in the path after upload'
      properties:
        path:
          type: string
          description: The path to watch.
          example: C:\FLA\test1
        file_watch_mode:
          type: string
          enum:
          - file
          - folder
          description: The file watch mode.
          example: file
        source_type:
          type: string
          description: The source type.
          example: unknown
        interval:
          type: integer
          description: 'The time in seconds the agent will monitor the files for changes before uploading.

            This also specifies the time between scans of the path.'
          example: 30
        start_date:
          type: string
          format: date
          description: Files with a last modified date on or after the specified date will be scanned and uploaded.
          example: '2023-03-27'
        patterns:
          type: array
          items:
            type: string
          description: Defines a list of [glob patterns](https://developers.tetrascience.com/docs/common-glob-pattern) to
            match files in the path.
          example:
          - '*.*'
        metadata:
          type: object
          description: Custom metadata to associate with files in the path.
          example:
            meta1: value1
        tags:
          type: string
          description: Comma-separated list of tags to associate with files in the path.
          example: tag1,tag2
        labels:
          type: array
          description: '**FLA v4.3.0+**: Labels applied to files in the path'
          items:
            type: object
            properties:
              name:
                type: string
                description: The label name.
                example: vendor
              value:
                type: string
                description: The label value.
                example: Beckman Coulter
            required:
            - name
            - value
        archive:
          type: object
          description: '**FLA v4.3.0+**: Options for archival and deletion of files in the path after upload'
          properties:
            path:
              type: string
              description: The location where files from this path will be archived
              example: c:\archive
            wait_time:
              type: integer
              description: Amount of time to wait before moving the source file to the archive path after uploading
              example: 1
            wait_time_unit:
              type: string
              enum:
              - Minutes
              - Hours
              - Days
              description: The unit for the wait_time
              example: Days
            archive_without_checksum:
              type: boolean
              description: Determines if files uploaded by a previous agent version that have no checksum are archived or
                not.
              example: false
            dry_run:
              type: boolean
              description: Whether to perform a dry run
              example: false
            delete:
              type: object
              description: Options for deletion of files from the archive path
              properties:
                wait_time:
                  type: integer
                  description: Amount of time to wait before deleting the file from the archive path
                  example: 7
                wait_time_unit:
                  type: string
                  enum:
                  - Minutes
                  - Hours
                  - Days
                  description: The unit for the wait_time
                  example: Days
              required:
              - wait_time
              - wait_time_unit
          required:
          - path
          - wait_time
          - wait_time_unit
        fetch_os_created_user:
          type: boolean
          description: Determines if the OS-created user metadata is retrieved and included as metadata on files in the path
            or not.
          example: false
        symlink_behavior:
          type: string
          enum:
          - Legacy
          - Ignore
          description: '**(For FLA v4.4.1 and higher only)** Specifies how the Agent handles symbolic links when file scanning.'
      required:
      - file_watch_mode
      - source_type
      - interval
      - start_date
      - path
      - patterns
    AgentConfiguration:
      type: object
      properties:
        id:
          type: string
          example: f82d2230-eed1-443c-9ed8-2e1fef9039c2
          description: The unique ID of the configuration.
        config:
          $ref: '#/components/schemas/FLAConfiguration'
        by:
          type: string
          example: cloud
          description: The entity that initiated the command.
        at:
          type: string
          format: date-time
          example: '2023-08-28T14:43:46.381Z'
          description: The timestamp when the command was executed.
        commandStatus:
          type: string
          example: SUCCESS
          description: The status of the command.
        commandId:
          type: string
          example: f82d2230-eed1-443c-9ed8-2e1fef9039c2
          description: The unique ID of the command.
    HubStatusDto:
