      tags:
      - Agents
      operationId: agent-get-configuration-list
      parameters:
      - name: agentId
        in: path
        description: Agent ID
        schema:
          type: string
        required: true
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          minimum: 0
          default: 1
        allowEmptyValue: false
      - name: size
        in: query
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          default: 10
        allowEmptyValue: false
      - name: by
        in: query
        description: Filter by agent config type
        schema:
          type: string
          enum:
          - local
          - cloud
          - all
          default: all
        allowEmptyValue: false
      - name: status
        in: query
        description: Filter by agent config by its command status
        schema:
          type: string
          enum:
          - CREATED
          - UNSENT
          - PENDING
          - PURGED
          - ERROR
          - PROCESSING
          - REJECTED
          - SUCCESS
          - FAILURE
          - all
          default: all
        allowEmptyValue: false
      - name: order
        in: query
        description: Sorting order by creation date
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
