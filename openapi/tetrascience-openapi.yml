  /v1/dataapps/apps/{id}/labels:
    put:
      summary: Update Data App labels for access control
      description: Replaces all labels assigned to a Data App. Labels drive EARS (Entitlement and Access Rights Service) access
        control policies — use them to control which users and teams can see and interact with a Data App. Pass an empty array
        to clear all labels.
      tags:
      - Data Apps
      operationId: update-container-data-app-labels
      parameters:
      - name: id
        in: path
        required: true
        description: Data App ID
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - labels
              properties:
                labels:
                  type: array
                  description: Complete set of labels to assign. Replaces any previously assigned labels.
                  items:
                    type: object
                    required:
                    - name
                    - value
                    properties:
                      name:
                        type: string
                        description: Label name (e.g., "department", "environment").
                      value:
                        type: string
                        description: Label value (e.g., "research", "production").
            examples:
              set_labels:
                summary: Assign access control labels
                value:
                  labels:
                  - name: department
                    value: research
                  - name: environment
                    value: production
              clear_labels:
                summary: Remove all labels
                value:
                  labels: []
      responses:
        '200':
          description: Labels updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid request format or label configuration.
        '404':
          description: Data App not found.
        '500':
          description: Internal Server Error
