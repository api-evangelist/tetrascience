  /v1/data-acquisition/agent/config:
    post:
      summary: Agent Configuration
      description: This endpoint returns all the parameters that client needs in order to upload files directly to Amazon
        S3 and upload log directly to Amazon CloudWatch. Using these values and temporary credentials obtained from `/v1/data-acquisition/agent/credentials`
        client can upload files to S3 into their bucket and log to CloudWatch into their log groups.
      tags:
      - Data Acquisition
      operationId: user-defined-integration-agent-configuration
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - agentId
              - agentVersion
              properties:
                agentId:
                  type: string
                  description: This is the sourceId for a user-defined integration. Need to copy from the TDP web UI, where
                    the user-defined integration is created. For existing TetraScience Agent who can connect to TetraScience
                    Cloud directly, provide the agentId to this field.
                agentVersion:
                  type: string
                  description: The Agent version, such as "v1.0.0".
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"orgSlug\": \"mgtest\",\n    \"integrationId\": \"844dc7e9-a4c4-429c-b364-b54bf531c078\"\
                    ,\n    \"agentId\": \"0db83bc0-0921-414c-ad1c-05d47af3dd44\",\n    \"agentName\": \"test agent\",\n  \
                    \  \"region\": \"us-east-2\",\n    \"bucket\": \"ts-platform-dev-datalake\",\n    \"streamBucket\": \"\
                    ts-platform-dev-stream\",\n    \"backupBucket\": \"ts-platform-dev-backup\",\n    \"kmsKey\": \"alias/customer-key-development-mgtest\"\
                    ,\n    \"integrationType\": \"user_defined\",\n    \"metadata\": {},\n    \"tags\": [],\n    \"logGroupName\"\
                    : \"/agents/mgtest/0db83bc0-0921-414c-ad1c-05d47af3dd44\",\n    \"rpcSourceQueueUrl\": \"https://sqs.us-east-2.amazonaws/706717599419/onprem-0db83bc0-0921-414c-ad1c-05d47af3dd44.fifo\"\
                    ,\n    \"rpcPlatformQueueUrl\": \"https://sqs.us-east-2.amazonaws/706717599419/onprem-development-command-service-inbound\"\
                    \n}"
              schema:
                type: object
                properties:
                  orgSlug:
                    type: string
                    example: mgtest
                  integrationId:
                    type: string
                    example: 844dc7e9-a4c4-429c-b364-b54bf531c078
                  agentId:
                    type: string
                    example: 0db83bc0-0921-414c-ad1c-05d47af3dd44
                  agentName:
                    type: string
                    example: test agent
                  region:
                    type: string
                    example: us-east-2
                  bucket:
                    type: string
                    example: ts-platform-dev-datalake
                  streamBucket:
                    type: string
                    example: ts-platform-dev-stream
                  backupBucket:
                    type: string
                    example: ts-platform-dev-backup
                  kmsKey:
                    type: string
                    example: alias/customer-key-development-mgtest
                  integrationType:
                    type: string
                    example: user_defined
                  metadata:
                    type: object
                    properties: {}
                  tags:
                    type: array
                  logGroupName:
                    type: string
                    example: /agents/mgtest/0db83bc0-0921-414c-ad1c-05d47af3dd44
                  rpcSourceQueueUrl:
                    type: string
                    example: https://sqs.us-east-2.amazonaws/706717599419/onprem-0db83bc0-0921-414c-ad1c-05d47af3dd44.fifo
                  rpcPlatformQueueUrl:
                    type: string
                    example: https://sqs.us-east-2.amazonaws/706717599419/onprem-development-command-service-inbound
