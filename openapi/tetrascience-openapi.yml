  /v1/agents:
    post:
      summary: Create an agent
      description: Use this endpoint to create a new agent.
      tags:
      - Agents
      operationId: agent-create
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - type
              - integrationType
              - integrationId
              properties:
                name:
                  type: string
                  description: 'Name of the new agent. Validation: It may contain any alphanumeric character, spaces, and
                    the following special characters, `-`, `_`, `+`, `.`, `/`.'
                  example: Agent name
                description:
                  type: string
                  description: Description of the new agent. It may contain any alphanumeric character, spaces, line breaks,
                    and the following special characters, `-`, `_`, `+`, `.`, `/`.
                  example: Agent description
                type:
                  type: string
                  description: Type of the new agent. The valid types are `file-log`, `empower`, `unicorn`, `labx`, `chromeleon`
                    or `user-defined`.
                  enum:
                  - file-log
                  - empower
                  - unicorn
                  - labx
                  - chromeleon
                  - user-defined
                  example: file-log
                sourceType:
                  type: string
                  description: Source Type of a user-defined agent. For a user-defined agent, it may contain any lower-case
                    alphanumeric character, spaces, and the following special characters, `-`, `_`, `+`, `.`, `/`. However,
                    a space can't be the first character. For other agent types it must be empty, null or not present
                  example: ''
                integrationType:
                  type: string
                  description: New agent's integration type. The valid types are `api` or `datahub`.
                  enum:
                  - api
                  - datahub
                integrationId:
                  type: string
                  description: Id of the connector to be used by the new agent, in GUID format
                  example: 6f166302-df8a-4044-ab4b-7ddd3eefb50b
                  format: uuid
                datahubId:
                  type: string
                  description: Id of the Data Hub the new agent is using, in GUID format. It is required for integrations
                    of type 'datahub'. It must be set to null, empty, or not present for integrations of type 'api'.
                  format: uuid
                  example: null
                tags:
                  type: array
                  items:
                    type: string
                  example:
                  - tag1
                  description: Tags to associate with the agent.
                metadata:
                  type: object
                  additionalProperties: true
                  example:
                    metadataKey: metadataValue
                  description: Metadata to associate with the agent.
                labels:
                  type: object
                  properties:
                    labelsToAdd:
                      description: Labels to add the agent
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            maxLength: 128
                            example: labelKey
                          value:
                            type: string
                            example: labelValue
                        required:
                        - name
                        - value
                  required:
                  - labelsToAdd
                  description: Labels to associate with the agent
      responses:
        '200':
          description: Successful response with agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: 9b9f275c-a60d-454f-8c6c-1ea094e3fd38
                    format: uuid
                    description: The ID of the agent.
                  name:
                    type: string
                    example: File-Log Agent
                    description: The name of the agent.
                  description:
                    type: string
                    example: description
                    description: The description of the agent.
                  sourceType:
                    type: string
                    nullable: true
                    description: The source type of the agent (nullable).
                  type:
                    type: string
                    example: file-log
                    description: The type of agent.
                  integrationType:
                    type: string
                    example: api
                    description: The integration type of the agent.
                  integrationId:
                    type: string
                    example: 6f166302-df8a-4044-ab4b-7ddd3eefb50b
                    format: uuid
                    description: The integration ID of the agent.
                  datahubId:
                    type: string
                    format: uuid
                    nullable: true
                    description: The Data Hub ID of the agent (nullable).
                  sourceId:
                    type: string
                    example: 9201d7a7-2282-4ef2-b295-a1d1d1927b9a
                    format: uuid
                    description: The source ID of the agent.
                  isEnabled:
                    type: boolean
                    example: true
                    description: Indicates if the agent is enabled or not.
                  tags:
                    type: array
                    items:
                      type: string
                    example:
                    - tag1
                    description: Tags associated with the agent.
                  metadata:
                    type: object
                    additionalProperties: true
                    example: null
                    description: Metadata associated with the agent.
                  config:
                    $ref: '#/components/schemas/FLAConfiguration'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    format: int32
                    example: 400
                  error:
                    type: string
                    example: Bad Request
                  message:
                    type: string
                    example: Error validating payload
                  validation:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          example: '"datahubId" is required'
    get:
      summary: Get agents
      description: Use this endpoint to get a list of agents.
      tags:
      - Agents
