    name: Tetra Scientific Data and AI Cloud API
    description: >-
      The Tetra Scientific Data and AI Cloud API (Tetra Data Platform API)
      is the programmatic surface for managing tenants, organizations,
      users, roles, agents, integrations, pipelines, files, datasets,
      schemas, and search across the TetraScience platform. It is used to
      automate lab data acquisition, ingestion, processing, and downstream
      delivery into analytics, AI, and informatics consumers.
