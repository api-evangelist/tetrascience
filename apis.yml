    authentication:
      - type: API Key
        header: ts-auth-token
        description: API token issued from the Tetra Data Platform admin console, sent in the `ts-auth-token` request header.
      - type: API Key
        header: x-org-slug
        description: Organization slug sent in the `x-org-slug` request header for tenant routing — required alongside the auth token.
      - type: SSO
        description: SAML 2.0 and OIDC for human users via configured identity providers (Okta, Azure AD, Ping, etc.).
